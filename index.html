<style>
:root{
  --negro:#0A0A0A;
  --negro-suave:#1A1A1A;
  --gris-oscuro:#2D2D2D;
  --gris-medio:#6B6B6B;
  --hueso:#F5F0EB;
  --blanco:#FAFAFA;
  --naranja:#C4703F;
  --naranja-claro:#D4885A;
  --naranja-oscuro:#A85A2F;
  --naranja-tenue:rgba(196,112,63,0.12);
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'Space Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--negro);color:var(--blanco);min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--gris-oscuro);border-radius:4px}
::-webkit-scrollbar-track{background:var(--negro-suave)}
.header{background:var(--negro);border-bottom:1px solid var(--gris-oscuro);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo-svg{height:26px;width:auto}
.header-sub{font-family:var(--font-mono);font-size:10px;color:var(--gris-medio);text-transform:uppercase;letter-spacing:.08em;margin-top:5px}
.tabs{display:flex;gap:6px}
.tab-btn{padding:8px 18px;border-radius:6px;font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--gris-oscuro);transition:.15s;letter-spacing:.01em}
.tab-btn.active{background:var(--naranja);color:var(--blanco);border-color:var(--naranja)}
.tab-btn.inactive{background:transparent;color:var(--gris-medio)}
.tab-btn.inactive:hover{background:var(--negro-suave);color:var(--blanco);border-color:var(--gris-medio)}
.main{max-width:1320px;margin:0 auto;padding:24px 32px;display:flex;flex-direction:column;gap:20px}
.month-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.month-label{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--gris-medio);text-transform:uppercase;letter-spacing:.08em;margin-right:4px}
.month-btn{padding:5px 13px;border-radius:5px;font-family:var(--font-mono);font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--gris-oscuro);background:transparent;color:var(--gris-medio);transition:.12s;text-transform:uppercase;letter-spacing:.04em}
.month-btn:hover{background:var(--negro-suave);color:var(--blanco);border-color:var(--gris-medio)}
.month-btn.active{background:var(--naranja);color:var(--blanco);border-color:var(--naranja)}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.card{border-radius:10px;padding:18px 20px;border:1px solid var(--gris-oscuro);background:var(--negro-suave)}
.card-label{font-family:var(--font-mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gris-medio);margin-bottom:8px}
.card-value{font-family:var(--font-display);font-size:26px;font-weight:700;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--blanco)}
.card-eg .card-value{color:var(--naranja-claro)}
.card-net-pos{border-color:var(--naranja);background:var(--naranja-tenue)}
.card-net-pos .card-value{color:var(--naranja)}
.card-net-neg .card-value{color:var(--naranja-claro)}
.charts-row{display:grid;grid-template-columns:3fr 2fr;gap:14px}
.chart-box{background:var(--negro-suave);border-radius:10px;border:1px solid var(--gris-oscuro);padding:20px}
.chart-title{font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--blanco);margin-bottom:4px;letter-spacing:-.01em}
.chart-sub{font-family:var(--font-mono);font-size:10px;color:var(--gris-medio);margin-bottom:14px;text-transform:uppercase;letter-spacing:.05em}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:180px;padding-bottom:28px;position:relative}
.bar-group{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;height:100%}
.bar-group .month-tick{position:absolute;bottom:-22px;font-family:var(--font-mono);font-size:9px;color:var(--gris-medio);text-align:center;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
.bar-wrap{display:flex;gap:2px;align-items:flex-end;height:100%;width:100%}
.bar{border-radius:3px 3px 0 0;min-height:2px;flex:1;transition:.3s;cursor:pointer;position:relative}
.bar:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--negro-suave);border:1px solid var(--gris-oscuro);color:var(--blanco);font-family:var(--font-mono);font-size:9px;padding:4px 8px;border-radius:4px;white-space:nowrap;z-index:10;pointer-events:none}
.bar-ing{background:var(--blanco)}
.bar-eg{background:var(--naranja)}
.chart-legend{display:flex;gap:14px;margin-top:10px;font-family:var(--font-mono);font-size:10px;color:var(--gris-medio);text-transform:uppercase;letter-spacing:.05em}
.legend-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.line-chart-wrap{background:var(--negro-suave);border-radius:10px;border:1px solid var(--gris-oscuro);padding:20px}
.donut-wrap{display:flex;flex-direction:column;gap:10px}
.donut-svg{display:block;margin:0 auto}
.donut-legend{display:flex;flex-direction:column;gap:4px;max-height:140px;overflow-y:auto}
.donut-item{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--gris-medio)}
.donut-item:hover{color:var(--blanco)}
.donut-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.donut-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--font-body)}
.donut-val{font-family:var(--font-mono);font-weight:700;font-size:10px;color:var(--blanco);flex-shrink:0}
.table-box{background:var(--negro-suave);border-radius:10px;border:1px solid var(--gris-oscuro);overflow:hidden}
.table-header{padding:16px 20px;border-bottom:1px solid var(--gris-oscuro);display:flex;align-items:center;gap:8px}
.table-header h2{font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--blanco);letter-spacing:-.01em}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:10px 14px;text-align:right;font-family:var(--font-mono);font-size:9px;font-weight:700;color:var(--gris-medio);background:var(--negro);white-space:nowrap;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--gris-oscuro)}
th:first-child{text-align:left;min-width:180px}
th:nth-child(2){text-align:center;width:52px}
td{padding:9px 14px;text-align:right;font-family:var(--font-mono);font-size:11px;white-space:nowrap;border-top:1px solid rgba(45,45,45,.6);color:var(--gris-medio)}
td:first-child{text-align:left;font-family:var(--font-body);font-weight:500;color:var(--blanco);font-size:12px}
td:nth-child(2){text-align:center}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-family:var(--font-mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.badge-ing{background:rgba(250,250,250,.1);color:var(--blanco)}
.badge-eg{background:var(--naranja-tenue);color:var(--naranja-claro)}
.pos{color:var(--blanco)}
.neg{color:var(--naranja-claro)}
.zero{color:var(--gris-oscuro)}
.section-divider td{background:var(--negro)!important;padding:7px 14px;font-family:var(--font-mono);font-size:9px;font-weight:700;color:var(--gris-medio);text-transform:uppercase;letter-spacing:.1em;border-top:1px solid var(--gris-oscuro)!important}
.total-row td{border-top:1px solid var(--naranja)!important;background:rgba(196,112,63,.06)!important;font-family:var(--font-mono);font-weight:700;font-size:12px}
.total-row td:first-child{font-family:var(--font-display);font-weight:700;color:var(--blanco)}
.total-amt-pos{color:var(--naranja);font-weight:700}
.total-amt-neg{color:var(--naranja-claro);font-weight:700}
.footer{text-align:center;font-family:var(--font-mono);font-size:10px;color:var(--gris-oscuro);padding:20px 0;text-transform:uppercase;letter-spacing:.08em}
.footer span{color:var(--naranja)}
@media(max-width:768px){.charts-row{grid-template-columns:1fr}.cards{grid-template-columns:1fr}.header{flex-direction:column;gap:12px;align-items:flex-start;padding:14px 16px}.main{padding:16px}}
</style>
</head>

function fmtShort(v,cur){var a=Math.abs(v),s=v<0?"-":v>0?"+":"",sym=cur==="ARS"?"$":"U$D ";if(a>=1e6)return s+sym+(a/1e6).toFixed(1)+"M";if(a>=1e3)return s+sym+(a/1e3).toFixed(1)+"K";return s+sym+a.toFixed(2);}
function cls(v){return v>0?"pos":v<0?"neg":"zero";}
function render(){var d=DATA[account];var months=d.months,cur=d.currency,cats=d.categories,totals=d.totals,incomeCats=d.incomeCats;var mi=selMonth!==null?months.indexOf(selMonth):null;document.querySelectorAll(".tab-btn").forEach(function(b,i){b.className="tab-btn "+(account===(i===0?"dolarapp":"santander")?"active":"inactive");});var mh='<span class="month-label">Filtrar:</span>';mh+='<button class="month-btn '+(selMonth===null?"active":"")+'" onclick="setMonth(null)">Todos</button>';months.forEach(function(m){mh+='<button class="month-btn '+(selMonth===m?"active":"")+'" onclick="setMonth(\''+m+'\')">'+m+'</button>';});document.getElementById("monthRow").innerHTML=mh;var ing=0,eg=0,neto=0;if(mi!==null){Object.values(cats).forEach(function(v){if(v[mi]>0)ing+=v[mi];else eg+=v[mi];});neto=totals[mi];}else{Object.values(cats).forEach(function(v){v.forEach(function(x){if(x>0)ing+=x;else eg+=x;});});neto=totals.reduce(function(a,b){return a+b;},0);}var nc=neto>=0?"card-net-pos":"card-net-neg";document.getElementById("summaryCards").innerHTML='<div class="card card-ing"><div class="card-label">'+(mi!==null?"Ingresos "+selMonth:"Ingresos totales")+'</div><div class="card-value">'+fmtShort(ing,cur)+'</div></div>'+'<div class="card card-eg"><div class="card-label">'+(mi!==null?"Egresos "+selMonth:"Egresos totales")+'</div><div class="card-value">'+fmtShort(Math.abs(eg),cur)+'</div></div>'+'<div class="card '+nc+'"><div class="card-label">'+(mi!==null?"Resultado "+selMonth:"Resultado neto")+'</div><div class="card-value">'+fmtShort(neto,cur)+'</div></div>';renderBar(months,cats,cur);var pmIdx=mi!==null?mi:months.length-1;renderDonut(months[pmIdx],cats,cur,pmIdx);renderLine(months,totals,cur);renderTable(months,cats,totals,incomeCats,cur);document.getElementById("tableTitle").textContent="Detalle por categoría — "+d.label;}
function renderBar(months,cats,cur){var bars=months.map(function(m,mi){var ing=0,eg=0;Object.values(cats).forEach(function(v){if(v[mi]>0)ing+=v[mi];else eg+=Math.abs(v[mi]);});return{m:m.replace("20",""),ing:ing,eg:eg};});var maxV=Math.max.apply(null,bars.map(function(b){return Math.max(b.ing,b.eg);}));if(!maxV)maxV=1;var html="";bars.forEach(function(b){var ih=Math.max((b.ing/maxV)*100,1).toFixed(1);var eh=Math.max((b.eg/maxV)*100,1).toFixed(1);html+='<div class="bar-group"><div class="bar-wrap"><div class="bar bar-ing" style="height:'+ih+'%" data-tip="+'+fmtShort(b.ing,cur).replace('+','')+'"></div><div class="bar bar-eg" style="height:'+eh+'%" data-tip="-'+fmtShort(b.eg,cur).replace('+','').replace('-','')+'"></div></div><span class="month-tick">'+b.m+'</span></div>';});document.getElementById("barChart").innerHTML=html;}
function renderDonut(monthLabel,cats,cur,mi){document.getElementById("pieTitle").textContent="Distribución — "+monthLabel;var entries=Object.entries(cats).map(function(e){return{n:e[0],v:Math.abs(e[1][mi])};}).filter(function(e){return e.v>0;}).sort(function(a,b){return b.v-a.v;});var total=entries.reduce(function(s,e){return s+e.v;},0)||1;var cx=65,cy=65,r=50,ir=28,angle=-Math.PI/2,svgPath="";entries.forEach(function(e,i){var pct=e.v/total,a0=angle,a1=angle+pct*2*Math.PI-0.01;var x0=cx+r*Math.cos(a0),y0=cy+r*Math.sin(a0);var x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);var ix0=cx+ir*Math.cos(a0),iy0=cy+ir*Math.sin(a0);var ix1=cx+ir*Math.cos(a1),iy1=cy+ir*Math.sin(a1);var lg=pct>0.5?1:0,col=PALETTE[i%PALETTE.length];svgPath+='<path d="M'+ix0.toFixed(2)+','+iy0.toFixed(2)+' L'+x0.toFixed(2)+','+y0.toFixed(2)+' A'+r+','+r+' 0 '+lg+',1 '+x1.toFixed(2)+','+y1.toFixed(2)+' L'+ix1.toFixed(2)+','+iy1.toFixed(2)+' A'+ir+','+ir+' 0 '+lg+',0 '+ix0.toFixed(2)+','+iy0.toFixed(2)+'" fill="'+col+'"><title>'+e.n+': '+fmtShort(e.v,cur)+'</title></path>';angle=a1+0.01;});document.getElementById("donutSvg").innerHTML=svgPath;var leg="";entries.slice(0,10).forEach(function(e,i){leg+='<div class="donut-item"><span class="donut-dot" style="background:'+PALETTE[i%PALETTE.length]+'"></span><span class="donut-name">'+e.n+'</span><span class="donut-val">'+fmtShort(e.v,cur)+'</span></div>';});if(entries.length>10)leg+='<div style="font-size:9px;color:#6B6B6B;margin-top:3px">+'+( entries.length-10)+' más</div>';document.getElementById("donutLegend").innerHTML=leg;}
function renderLine(months,totals,cur){var W=800,H=90,PAD=14;var minV=Math.min.apply(null,totals),maxV=Math.max.apply(null,totals);var range=maxV-minV||1;var pts=totals.map(function(v,i){return{x:PAD+(i/(months.length-1||1))*(W-PAD*2),y:PAD+(1-(v-minV)/range)*(H-PAD*2),v:v};});var pathD=pts.map(function(p,i){return(i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1);}).join(" ");var zero=PAD+(1-(0-minV)/range)*(H-PAD*2);var zLine=(zero>=PAD&&zero<=H+PAD)?'<line x1="'+PAD+'" y1="'+zero.toFixed(1)+'" x2="'+(W-PAD)+'" y2="'+zero.toFixed(1)+'" stroke="#2D2D2D" stroke-width="1" stroke-dasharray="4,3"/>':'';var areaD=pathD+" L"+pts[pts.length-1].x.toFixed(1)+","+(H+PAD)+" L"+PAD+","+(H+PAD)+" Z";var dots=pts.map(function(p,i){return'<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="4.5" fill="'+(p.v>=0?"#FAFAFA":"#C4703F")+'" stroke="#0A0A0A" stroke-width="1.5"><title>'+months[i]+': '+fmtShort(p.v,cur)+'</title></circle>';}).join("");var labels=pts.map(function(p,i){return'<text x="'+p.x.toFixed(1)+'" y="'+(H+28)+'" text-anchor="middle" font-size="8" fill="#6B6B6B" font-family="Space Mono,monospace">'+months[i].replace("20","")+'</text>';}).join("");document.getElementById("lineSvgWrap").innerHTML='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+W+' '+(H+36)+'" width="100%" height="120"><defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C4703F" stop-opacity=".15"/><stop offset="100%" stop-color="#C4703F" stop-opacity="0"/></linearGradient></defs><path d="'+areaD+'" fill="url(#ag)"/>'+zLine+'<path d="'+pathD+'" fill="none" stroke="#C4703F" stroke-width="2" stroke-linejoin="round"/>'+dots+labels+'</svg>';}
function renderTable(months,cats,totals,incomeCats,cur){function isInc(n){return incomeCats.indexOf(n)>=0;}var th='<thead><tr><th>Categoría</th><th>Tipo</th>';months.forEach(function(m){th+='<th>'+m+'</th>';});th+='<th>Total</th></tr></thead>';function makeRows(entries){return entries.map(function(entry){var name=entry[0],vals=entry[1];var total=vals.reduce(function(s,v){return s+v;},0);var inc=isInc(name);var cells=months.map(function(_,mi){return'<td class="'+cls(vals[mi])+'">'+fmtFull(vals[mi],cur)+'</td>';}).join("");return'<tr><td>'+name+'</td><td><span class="badge '+(inc?"badge-ing":"badge-eg")+'">'+(inc?"Ing":"Eg")+'</span></td>'+cells+'<td class="'+cls(total)+'" style="font-weight:700">'+fmtFull(total,cur)+'</td></tr>';}).join("");}var incE=Object.entries(cats).filter(function(e){return isInc(e[0]);});var egE=Object.entries(cats).filter(function(e){return !isInc(e[0]);});var grandTotal=totals.reduce(function(a,b){return a+b;},0);var totalRow='<tr class="total-row"><td colspan="2">Resultado neto</td>'+totals.map(function(t){return'<td class="'+(t>=0?"total-amt-pos":"total-amt-neg")+'">'+fmtFull(t,cur)+'</td>';}).join("")+  '<td class="'+(grandTotal>=0?"total-amt-pos":"total-amt-neg")+'">'+fmtFull(grandTotal,cur)+'</td></tr>';document.getElementById("mainTable").innerHTML=th+'<tbody><tr class="section-divider"><td colspan="'+(months.length+3)+'">Ingresos</td></tr>'+makeRows(incE)+'<tr class="section-divider"><td colspan="'+(months.length+3)+'">Egresos</td></tr>'+makeRows(egE)+totalRow+'</tbody>';}
function setAccount(acc){account=acc;selMonth=null;render();}
function setMonth(m){selMonth=(m===selMonth?null:m);render();}
render();
</script>
</body>
